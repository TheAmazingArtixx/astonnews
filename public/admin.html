<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Aston News</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <a href="/" class="logo-wrap">
    <img src="https://i.imgur.com/6pjRLfE.png" alt="Aston News" class="site-logo">
  </a>
  <nav class="main-nav">
    <a href="/">Accueil</a>
    <a href="/journal.html">Journal</a>
  </nav>
</header>

<main>
  <!-- LOGIN -->
  <div id="login-view" class="login-card" hidden>
    <h1>Connexion</h1>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" autocomplete="current-password">
    </div>
    <p class="error-text" id="login-error" hidden></p>
    <button class="btn" id="login-btn" style="width:100%; justify-content:center;">Se connecter</button>
  </div>

  <!-- ADMIN -->
  <div id="admin-view" class="admin-layout" hidden>
    <div class="admin-topbar">
      <h1>Administration</h1>
      <button class="btn btn-secondary" id="logout-btn">Se déconnecter</button>
    </div>

    <div class="tabs">
      <button data-tab="articles" class="active">Articles</button>
      <button data-tab="settings">Réglages radio</button>
    </div>

    <!-- ONGLET ARTICLES -->
    <section id="tab-articles">
      <div class="admin-card">
        <div class="admin-card-header">
          <h2>Articles publiés</h2>
          <button class="btn btn-primary" id="new-article-btn">+ Nouvel article</button>
        </div>
        <div id="article-list"></div>
      </div>

      <!-- ÉDITEUR -->
      <div class="admin-card" id="editor-card" hidden>
        <h2 id="editor-title" style="margin-bottom:18px">Nouvel article</h2>

        <div class="field">
          <label for="art-title">Titre</label>
          <input type="text" id="art-title" placeholder="Titre de l'article">
        </div>

        <div class="field">
          <label for="art-excerpt">Résumé (affiché sur les vignettes)</label>
          <textarea id="art-excerpt" rows="2" placeholder="Courte description…"></textarea>
        </div>

        <!-- Tags -->
        <div class="field">
          <label>Tags</label>
          <div style="display:flex;gap:6px;margin-bottom:8px">
            <input type="text" id="tag-input" placeholder="Ajouter un tag, puis Entrée" style="flex:1">
            <button class="btn btn-secondary" id="tag-add-btn" type="button">Ajouter</button>
          </div>
          <div id="tags-wrap" class="tags-wrap"></div>
        </div>

        <!-- Image de couverture URL -->
        <div class="field">
          <label for="art-cover-url">Image de couverture (URL Imgur ou autre)</label>
          <input type="url" id="art-cover-url" placeholder="https://i.imgur.com/…">
          <div id="cover-preview" class="cover-preview"></div>
        </div>

        <!-- Gradient -->
        <div class="field">
          <label>Couleur de fond / dégradé de la vignette</label>
          <div id="gradient-picker" class="gradient-picker"></div>
        </div>

        <!-- Flou sur l'image -->
        <div class="field">
          <label>Effet de flou sur l'image de couverture</label>
          <div style="display:flex;align-items:center;gap:12px">
            <input type="range" id="blur-slider" min="0" max="14" step="1" value="0" style="flex:1;accent-color:var(--accent)">
            <span id="blur-value" style="font-size:13px;color:var(--ink-2);min-width:32px">0px</span>
          </div>
          <p class="helper-text">0 = pas de flou. Le dégradé est superposé par-dessus.</p>
        </div>

        <!-- Contenu -->
        <div class="field">
          <label>Contenu de l'article</label>
          <div id="blocks-container"></div>
          <div class="add-block-bar">
            <button class="btn btn-secondary" type="button" id="add-paragraph">+ Paragraphe</button>
            <button class="btn btn-secondary" type="button" id="add-heading">+ Sous-titre</button>
            <button class="btn btn-secondary" type="button" id="add-image">+ Image</button>
          </div>
        </div>

        <div class="divider"></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" id="save-article-btn">Enregistrer</button>
          <button class="btn btn-secondary" id="cancel-edit-btn">Annuler</button>
        </div>
        <p class="error-text" id="editor-error" hidden></p>
      </div>
    </section>

    <!-- ONGLET RÉGLAGES -->
    <section id="tab-settings" hidden>
      <div class="admin-card">
        <div class="admin-card-header"><h2>Émission radio en bas de page</h2></div>
        <div class="field">
          <label for="show-name">Nom de l'émission affiché</label>
          <input type="text" id="show-name" placeholder="Radio - 21h 23h avec Nyyxtra">
        </div>
        <div class="field">
          <label for="stream-url">URL de la source du flux</label>
          <input type="url" id="stream-url" placeholder="https://source.clgnelsonmandela.com/source">
        </div>
        <div class="field">
          <div class="checkbox-row">
            <input type="checkbox" id="radio-enabled">
            <label for="radio-enabled">Source active (décocher si la source est hors ligne)</label>
          </div>
        </div>
        <button class="btn btn-primary" id="save-settings-btn">Enregistrer les réglages</button>
        <p class="error-text" id="settings-error" hidden></p>
      </div>
    </section>
  </div>
</main>

<div id="toast" class="toast" hidden></div>
<script src="/js/admin.js"></script>
</body>
</html>
